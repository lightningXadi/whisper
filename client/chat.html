<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisper</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="fog-canvas-wrap" id="fog-canvas" style="opacity:0.35;"></div>

<div class="app-shell" id="app-shell">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Recent Echoes</h2>
      <div class="profile-menu-wrap">
        <button id="profile-btn" title="Profile"></button>
        <div class="profile-dropdown" id="profile-dropdown">
          <div class="profile-dropdown-header">
            <div id="profile-dropdown-avatar"></div>
            <div>
              <div class="profile-dropdown-name" id="profile-dropdown-name">—</div>
              <div class="profile-dropdown-email" id="profile-dropdown-email">—</div>
            </div>
          </div>
          <button id="logout-btn" class="profile-dropdown-item">Log out</button>
        </div>
      </div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="user-search" placeholder="🔍  Search people to start whispering…">
    </div>
    <div id="search-results" class="convo-list" style="display:none; border-bottom:1px solid rgba(255,255,255,0.05); max-height:220px;"></div>
    <div class="convo-list" id="convo-list"></div>
  </aside>

  <section class="chat-main" id="chat-main">
    <div class="empty-state" id="empty-state">
      <h3>Choose an echo to answer</h3>
      <p>Pick a conversation, or start whispering to someone new.</p>
    </div>

    <div id="active-chat" style="display:none; flex-direction:column; height:100%;">
      <div class="chat-header">
        <div class="chat-header-left">
          <button id="back-btn" class="back-btn" title="Back">←</button>
          <div id="chat-header-avatar"></div>
          <div>
            <h3 class="chat-header-name" id="chat-header-name">—</h3>
            <div class="chat-header-status" id="chat-header-status-text">Offline</div>
          </div>
        </div>
        <div class="chat-header-actions" style="display:flex; gap:6px;">
          <button id="call-btn" title="Call">📞</button>
        </div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="typing-indicator" id="typing-indicator" style="display:none; padding: 0 32px 8px;">
        <div class="firefly"></div><div class="firefly"></div><div class="firefly"></div>
        <span id="typing-text">wandering…</span>
      </div>

      <div class="composer">
        <textarea id="message-input" placeholder="Whisper into the void…" rows="1"></textarea>
        <button class="send-btn" id="send-btn">➤</button>
      </div>
    </div>
  </section>
</div>

<!-- Incoming call banner -->
<div class="incoming-call-card" id="incoming-call-card">
  <div id="incoming-call-avatar"></div>
  <div>
    <div style="font-weight:600;" id="incoming-call-name">Someone</div>
    <div style="font-size:12px; color:var(--fog);">is calling…</div>
  </div>
  <div class="incoming-call-actions">
    <button class="icc-accept" id="icc-accept">✓</button>
    <button class="icc-decline" id="icc-decline">✕</button>
  </div>
</div>

<!-- Full-screen call overlay -->
<div class="call-overlay" id="call-overlay">
  <div class="call-header">
    <div class="label" id="call-status-label">In Communion</div>
    <h1 id="call-peer-name">—</h1>
    <div class="timer" id="call-timer">00:00</div>
  </div>
  <div class="call-avatar-wrap">
    <div class="pulse-ring r1"></div>
    <div class="pulse-ring r2"></div>
    <div id="call-avatar" style="position:relative;"></div>
    <div class="call-badge" id="call-badge">Echoing…</div>
  </div>
  <div class="call-controls">
    <button class="call-btn" id="mute-btn">
      <div class="circle">🎙️</div>
      <span class="label">Mute</span>
    </button>
    <button class="call-btn end" id="end-call-btn">
      <div class="circle">☎</div>
      <span class="label">End Call</span>
    </button>
    <button class="call-btn" id="speaker-btn">
      <div class="circle">🔊</div>
      <span class="label">Speaker</span>
    </button>
  </div>
</div>

<audio id="remote-audio" autoplay></audio>

<script src="js/config.js"></script>
<script>
  // Load scripts in order without document.write (which Chrome flags/blocks
  // for cross-origin scripts on slow connections). Each script loads only
  // after the previous one finishes, preserving the dependency order.
  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = () => reject(new Error('Failed to load ' + src));
      document.body.appendChild(s);
    });
  }

  (async function bootstrap() {
    try {
      const apiUrl = window.WHISPER_API_URL || 'http://localhost:5000';
      await loadScript(apiUrl + '/socket.io/socket.io.js');
      await loadScript('js/fog.js');
      await loadScript('js/api.js');
      await loadScript('js/avatar.js');
      await loadScript('js/call.js');
      await loadScript('js/chat.js');
    } catch (err) {
      console.error(err);
      alert('Whisper could not connect to the server. Please check your connection and refresh.');
    }
  })();
</script>
</body>
</html>
