<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisper</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="fog-canvas-wrap" id="fog-canvas" style="opacity:0.35;"></div>

<div class="app-shell" id="app-shell">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Recent Echoes</h2>
      <button id="new-chat-btn" title="Start a new conversation" class="btn btn-ghost" style="padding:8px 12px;">+ New</button>
    </div>
    <div class="sidebar-search">
      <input type="text" id="user-search" placeholder="Find someone to whisper to…">
    </div>
    <div id="search-results" class="convo-list" style="display:none; border-bottom:1px solid rgba(255,255,255,0.05); max-height:220px;"></div>
    <div class="convo-list" id="convo-list"></div>

    <div class="sidebar-footer">
      <div class="profile-menu" id="profile-menu">
        <button id="logout-btn" class="logout">🚪 Log out</button>
      </div>
      <button class="profile-trigger" id="profile-trigger">
        <div id="profile-avatar"></div>
        <div class="profile-name-wrap">
          <div class="name" id="profile-name">—</div>
          <div class="sub">View profile</div>
        </div>
        <span class="profile-caret">▲</span>
      </button>
    </div>
  </aside>

  <section class="chat-main" id="chat-main">
    <div class="empty-state" id="empty-state">
      <h3>Choose an echo to answer</h3>
      <p>Pick a conversation, or start whispering to someone new.</p>
    </div>

    <div id="active-chat" style="display:none; flex-direction:column; height:100%;">
      <div class="chat-header">
        <div class="chat-header-left">
          <button class="back-btn" id="back-btn" title="Back">←</button>
          <div id="chat-header-avatar"></div>
          <div>
            <h3 class="chat-header-name" id="chat-header-name">—</h3>
            <div class="chat-header-status" id="chat-header-status">
              <span id="chat-header-status-text">Resting in the Bracken</span>
            </div>
          </div>
        </div>
        <div class="chat-header-actions" style="display:flex; gap:6px;">
          <button id="call-btn" title="Call">📞</button>
        </div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="typing-indicator" id="typing-indicator" style="display:none; padding: 0 32px 8px;">
        <div class="firefly"></div><div class="firefly"></div><div class="firefly"></div>
        <span id="typing-text">wandering…</span>
      </div>

      <div class="composer">
        <textarea id="message-input" placeholder="Whisper into the void…" rows="1"></textarea>
        <button class="send-btn" id="send-btn">➤</button>
      </div>
    </div>
  </section>
</div>

<!-- Incoming call banner -->
<div class="incoming-call-card" id="incoming-call-card">
  <div id="incoming-call-avatar"></div>
  <div>
    <div style="font-weight:600;" id="incoming-call-name">Someone</div>
    <div style="font-size:12px; color:var(--fog);">is calling…</div>
  </div>
  <div class="incoming-call-actions">
    <button class="icc-accept" id="icc-accept">✓</button>
    <button class="icc-decline" id="icc-decline">✕</button>
  </div>
</div>

<!-- Full-screen call overlay -->
<div class="call-overlay" id="call-overlay">
  <div class="call-header">
    <div class="label" id="call-status-label">In Communion</div>
    <h1 id="call-peer-name">—</h1>
    <div class="timer" id="call-timer">00:00</div>
  </div>
  <div class="call-avatar-wrap">
    <div class="pulse-ring r1"></div>
    <div class="pulse-ring r2"></div>
    <div id="call-avatar" style="position:relative;"></div>
    <div class="call-badge" id="call-badge">Echoing…</div>
  </div>
  <div class="call-controls">
    <button class="call-btn" id="mute-btn">
      <div class="circle">🎙️</div>
      <span class="label">Mute</span>
    </button>
    <button class="call-btn end" id="end-call-btn">
      <div class="circle">☎</div>
      <span class="label">End Call</span>
    </button>
    <button class="call-btn" id="speaker-btn">
      <div class="circle">🔊</div>
      <span class="label">Speaker</span>
    </button>
  </div>
</div>

<audio id="remote-audio" autoplay></audio>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="js/config.js"></script>
<script src="js/fog.js"></script>
<script src="js/api.js"></script>
<script src="js/avatar.js"></script>
<script src="js/call.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
